<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Price Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .price-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px 25px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .price-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .currency-code {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 8px;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        .price {
            font-size: 2.2em;
            font-weight: bold;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .currency-name {
            font-size: 0.95em;
            opacity: 0.85;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 1.2em;
            padding: 40px 20px;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #fcc;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .last-updated {
            color: #666;
            font-size: 0.95em;
        }

        .next-update {
            color: #667eea;
            font-size: 0.95em;
            font-weight: 600;
        }

        .update-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            color: #666;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .price {
                font-size: 1.6em;
            }

            .info-bar {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>₿ Bitcoin Price Tracker</h1>
        <p class="subtitle">Real-time prices in USD, AUD, PHP</p>
        
        <div id="error-message"></div>
        <div id="loading" class="loading">
            <div class="spinner"></div>
            Loading Bitcoin prices...
        </div>
        
        <div id="prices" class="price-grid" style="display: none;"></div>
        
        <div id="info-bar" class="info-bar" style="display: none;">
            <div class="update-status">
                <span class="status-indicator"></span>
                Live Updates
            </div>
            <div class="last-updated">
                Last updated: <span id="timestamp">--:--:--</span>
            </div>
            <div class="next-update">
                Next update in: <span id="countdown">5:00</span>
            </div>
        </div>
    </div>

    <script>
        const currencies = [
            { code: 'usd', name: 'US Dollar' },
            { code: 'aud', name: 'Australian Dollar' },
            { code: 'php', name: 'Philippine Peso' }
        ];

        let countdownInterval;
        let timeUntilNextUpdate = 300; // 5 minutes in seconds

        async function fetchPrices() {
            const errorDiv = document.getElementById('error-message');
            const loadingDiv = document.getElementById('loading');
            const pricesDiv = document.getElementById('prices');
            const infoBar = document.getElementById('info-bar');

            errorDiv.innerHTML = '';
            errorDiv.style.display = 'none';

            try {
                const ids = currencies.map(c => c.code).join(',');
                const response = await fetch(
                    `https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=${ids}`
                );

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                const bitcoinPrices = data.bitcoin;

                pricesDiv.innerHTML = currencies.map(currency => {
                    const price = bitcoinPrices[currency.code];
                    const formattedPrice = new Intl.NumberFormat('en-US', {
                        style: 'currency',
                        currency: currency.code.toUpperCase(),
                        minimumFractionDigits: 2,
                        maximumFractionDigits: 2
                    }).format(price);

                    return `
                        <div class="price-card">
                            <div class="currency-code">${currency.code.toUpperCase()}</div>
                            <div class="price">${formattedPrice}</div>
                            <div class="currency-name">${currency.name}</div>
                        </div>
                    `;
                }).join('');

                const now = new Date();
                const timeString = now.toLocaleTimeString('en-US', { 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit' 
                });
                document.getElementById('timestamp').textContent = timeString;

                loadingDiv.style.display = 'none';
                pricesDiv.style.display = 'grid';
                infoBar.style.display = 'flex';

                timeUntilNextUpdate = 300;
                updateCountdown();

            } catch (error) {
                console.error('Error fetching prices:', error);
                errorDiv.innerHTML = `<div class="error">⚠️ Failed to fetch Bitcoin prices. Retrying in 5 minutes...</div>`;
                errorDiv.style.display = 'block';
                loadingDiv.style.display = 'none';
                pricesDiv.style.display = 'grid';
                infoBar.style.display = 'flex';
            }
        }

        function updateCountdown() {
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }

            countdownInterval = setInterval(() => {
                timeUntilNextUpdate--;

                if (timeUntilNextUpdate <= 0) {
                    clearInterval(countdownInterval);
                    fetchPrices();
                    return;
                }

                const minutes = Math.floor(timeUntilNextUpdate / 60);
                const seconds = timeUntilNextUpdate % 60;
                const countdownText = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                document.getElementById('countdown').textContent = countdownText;
            }, 1000);
        }

        window.addEventListener('load', () => {
            fetchPrices();
        });
    </script>
</body>
</html>
