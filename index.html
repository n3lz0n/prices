<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Price Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 12px;
            max-width: 1400px;
            width: 100%;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 12px;
            flex-wrap: wrap;
        }

        h1 {
            color: #333;
            font-size: 1.6em;
            margin: 0;
        }

        .api-selector {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .api-selector label {
            color: #666;
            font-size: 0.85em;
            font-weight: 600;
        }

        .api-selector select {
            padding: 6px 10px;
            border: 2px solid #667eea;
            border-radius: 6px;
            font-size: 0.85em;
            background: white;
            color: #333;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }

        .api-selector select:hover {
            border-color: #764ba2;
        }

        .api-selector select:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }

        .subtitle {
            color: #666;
            font-size: 0.8em;
            margin-bottom: 8px;
        }

        .crypto-sections {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 10px;
        }

        .crypto-section {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 12px;
            border: 2px solid #f0f0f0;
        }

        .section-title {
            color: #333;
            font-size: 1.1em;
            margin-bottom: 8px;
            text-align: center;
            padding-bottom: 8px;
            border-bottom: 3px solid #667eea;
        }

        .price-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .price-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            color: white;
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .price-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.5);
        }

        .currency-code {
            font-size: 0.75em;
            font-weight: 600;
            opacity: 0.9;
            letter-spacing: 0.5px;
        }

        .price {
            font-size: 1.2em;
            font-weight: bold;
            margin: 3px 0;
            word-break: break-word;
        }

        .currency-name {
            font-size: 0.7em;
            opacity: 0.85;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 0.8em;
            padding: 8px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 4px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 6px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid #fcc;
            font-size: 0.75em;
        }

        .info-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 8px;
            flex-wrap: wrap;
        }

        .last-updated {
            color: #666;
            font-size: 0.8em;
        }

        .next-update {
            color: #667eea;
            font-size: 0.8em;
            font-weight: 600;
        }

        .update-status {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8em;
            color: #666;
        }

        .status-indicator {
            width: 7px;
            height: 7px;
            background: #4caf50;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @media (max-width: 1024px) {
            .crypto-sections {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            h1 {
                font-size: 1.4em;
            }

            .header-top {
                flex-direction: column;
                align-items: flex-start;
                margin-bottom: 6px;
            }

            .subtitle {
                font-size: 0.75em;
                margin-bottom: 6px;
            }

            .crypto-sections {
                grid-template-columns: 1fr;
                gap: 10px;
                margin-bottom: 8px;
            }

            .section-title {
                font-size: 1em;
                margin-bottom: 6px;
                padding-bottom: 6px;
            }

            .price {
                font-size: 1.1em;
            }

            .info-bar {
                flex-direction: column;
                align-items: center;
                gap: 6px;
                padding: 6px;
            }

            .api-selector {
                width: 100%;
            }

            .api-selector select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-top">
            <h1>💰 Crypto Prices</h1>
            <div class="api-selector">
                <label for="api-source">API:</label>
                <select id="api-source">
                    <option value="coingecko">CoinGecko</option>
                    <option value="coinpaprika">CoinPaprika</option>
                </select>
            </div>
        </div>

        <p class="subtitle">Bitcoin, Ethereum & Ripple (USD, AUD, PHP)</p>
        
        <div class="crypto-sections">
            <!-- Bitcoin Section -->
            <div class="crypto-section bitcoin">
                <h2 class="section-title">₿ Bitcoin</h2>
                <div id="error-bitcoin" class="error" style="display: none;"></div>
                <div id="loading-bitcoin" class="loading">
                    <div class="spinner"></div>
                    Loading...
                </div>
                <div id="prices-bitcoin" class="price-grid" style="display: none;"></div>
            </div>

            <!-- Ethereum Section -->
            <div class="crypto-section ethereum">
                <h2 class="section-title">Ξ Ethereum</h2>
                <div id="error-ethereum" class="error" style="display: none;"></div>
                <div id="loading-ethereum" class="loading">
                    <div class="spinner"></div>
                    Loading...
                </div>
                <div id="prices-ethereum" class="price-grid" style="display: none;"></div>
            </div>

            <!-- Ripple Section -->
            <div class="crypto-section ripple">
                <h2 class="section-title">✕ Ripple (XRP)</h2>
                <div id="error-ripple" class="error" style="display: none;"></div>
                <div id="loading-ripple" class="loading">
                    <div class="spinner"></div>
                    Loading...
                </div>
                <div id="prices-ripple" class="price-grid" style="display: none;"></div>
            </div>
        </div>

        <!-- Info Bar -->
        <div id="info-bar" class="info-bar" style="display: none;">
            <div class="update-status">
                <span class="status-indicator"></span>
                Live
            </div>
            <div class="last-updated">
                Updated: <span id="timestamp">--:--:--</span>
            </div>
            <div class="next-update">
                Next: <span id="countdown">5:00</span>
            </div>
        </div>
    </div>

    <script>
        const currencies = [
            { code: 'usd', name: 'USD' },
            { code: 'aud', name: 'AUD' },
            { code: 'php', name: 'PHP' }
        ];

        let countdownInterval;
        let timeUntilNextUpdate = 300;
        let currentAPI = 'coingecko';

        document.getElementById('api-source').addEventListener('change', function(e) {
            currentAPI = e.target.value;
            fetchPrices();
        });

        async function fetchPrices() {
            const errorBitcoin = document.getElementById('error-bitcoin');
            const loadingBitcoin = document.getElementById('loading-bitcoin');
            const pricesBitcoin = document.getElementById('prices-bitcoin');

            const errorEthereum = document.getElementById('error-ethereum');
            const loadingEthereum = document.getElementById('loading-ethereum');
            const pricesEthereum = document.getElementById('prices-ethereum');

            const errorRipple = document.getElementById('error-ripple');
            const loadingRipple = document.getElementById('loading-ripple');
            const pricesRipple = document.getElementById('prices-ripple');

            const infoBar = document.getElementById('info-bar');

            errorBitcoin.style.display = 'none';
            errorEthereum.style.display = 'none';
            errorRipple.style.display = 'none';

            try {
                let data;

                if (currentAPI === 'coingecko') {
                    const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,ripple&vs_currencies=usd,aud,php');
                    if (!response.ok) throw new Error('CoinGecko API error');
                    data = await response.json();

                } else if (currentAPI === 'coinpaprika') {
                    const btcRes = await fetch('https://api.coinpaprika.com/v1/tickers/btc-bitcoin?quotes=USD,AUD,PHP');
                    const ethRes = await fetch('https://api.coinpaprika.com/v1/tickers/eth-ethereum?quotes=USD,AUD,PHP');
                    const xrpRes = await fetch('https://api.coinpaprika.com/v1/tickers/xrp-xrp?quotes=USD,AUD,PHP');

                    if (!btcRes.ok || !ethRes.ok || !xrpRes.ok) throw new Error('CoinPaprika API error');

                    const btc = await btcRes.json();
                    const eth = await ethRes.json();
                    const xrp = await xrpRes.json();

                    data = {
                        bitcoin: {
                            usd: btc.quotes.USD.price,
                            aud: btc.quotes.AUD.price,
                            php: btc.quotes.PHP.price
                        },
                        ethereum: {
                            usd: eth.quotes.USD.price,
                            aud: eth.quotes.AUD.price,
                            php: eth.quotes.PHP.price
                        },
                        ripple: {
                            usd: xrp.quotes.USD.price,
                            aud: xrp.quotes.AUD.price,
                            php: xrp.quotes.PHP.price
                        }
                    };
                }

                updateCryptoDisplay(data.bitcoin, pricesBitcoin, loadingBitcoin);
                updateCryptoDisplay(data.ethereum, pricesEthereum, loadingEthereum);
                updateCryptoDisplay(data.ripple, pricesRipple, loadingRipple);

                const now = new Date();
                const timeString = now.toLocaleTimeString('en-US', { 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit' 
                });
                document.getElementById('timestamp').textContent = timeString;

                infoBar.style.display = 'flex';
                timeUntilNextUpdate = 300;
                updateCountdown();

            } catch (error) {
                console.error('Error fetching prices:', error);
                const errorMsg = '<div class="error">Failed to fetch</div>';
                
                errorBitcoin.innerHTML = errorMsg;
                errorBitcoin.style.display = 'block';
                loadingBitcoin.style.display = 'none';
                pricesBitcoin.style.display = 'none';

                errorEthereum.innerHTML = errorMsg;
                errorEthereum.style.display = 'block';
                loadingEthereum.style.display = 'none';
                pricesEthereum.style.display = 'none';

                errorRipple.innerHTML = errorMsg;
                errorRipple.style.display = 'block';
                loadingRipple.style.display = 'none';
                pricesRipple.style.display = 'none';

                infoBar.style.display = 'flex';
            }
        }

        function updateCryptoDisplay(prices, container, loader) {
            container.innerHTML = currencies.map(currency => {
                const price = prices[currency.code];
                const formattedPrice = new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: currency.code.toUpperCase(),
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                }).format(price);

                return '<div class="price-card"><div class="currency-code">' + currency.code.toUpperCase() + '</div><div class="price">' + formattedPrice + '</div><div class="currency-name">' + currency.name + '</div></div>';
            }).join('');

            loader.style.display = 'none';
            container.style.display = 'grid';
        }

        function updateCountdown() {
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }

            countdownInterval = setInterval(function() {
                timeUntilNextUpdate--;

                if (timeUntilNextUpdate <= 0) {
                    clearInterval(countdownInterval);
                    fetchPrices();
                    return;
                }

                const minutes = Math.floor(timeUntilNextUpdate / 60);
                const seconds = timeUntilNextUpdate % 60;
                const countdownText = minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
                document.getElementById('countdown').textContent = countdownText;
            }, 1000);
        }

        window.addEventListener('load', function() {
            fetchPrices();
        });
    </script>
</body>
</html>
