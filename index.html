<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Price Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .section-title {
            color: #333;
            font-size: 1.8em;
            margin-top: 40px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .section-title:first-of-type {
            margin-top: 0;
        }

        .price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .price-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px 25px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .price-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .price-card.ethereum {
            background: linear-gradient(135deg, #627eea 0%, #764ba2 100%);
        }

        .price-card.ripple {
            background: linear-gradient(135deg, #23292f 0%, #667eea 100%);
        }

        .currency-code {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 8px;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        .price {
            font-size: 2.2em;
            font-weight: bold;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .currency-name {
            font-size: 0.95em;
            opacity: 0.85;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 1.2em;
            padding: 40px 20px;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #fcc;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .last-updated {
            color: #666;
            font-size: 0.95em;
        }

        .next-update {
            color: #667eea;
            font-size: 0.95em;
            font-weight: 600;
        }

        .update-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            color: #666;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .price {
                font-size: 1.6em;
            }

            .info-bar {
                flex-direction: column;
                align-items: flex-start;
            }

            .section-title {
                font-size: 1.4em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Crypto Price Tracker</h1>
        <p class="subtitle">Real-time prices for Bitcoin, Ethereum & Ripple in USD, AUD, PHP</p>
        
        <!-- Bitcoin Section -->
        <h2 class="section-title">₿ Bitcoin</h2>
        <div id="error-bitcoin" class="error" style="display: none;"></div>
        <div id="loading-bitcoin" class="loading">
            <div class="spinner"></div>
            Loading Bitcoin prices...
        </div>
        <div id="prices-bitcoin" class="price-grid" style="display: none;"></div>

        <!-- Ethereum Section -->
        <h2 class="section-title">Ξ Ethereum</h2>
        <div id="error-ethereum" class="error" style="display: none;"></div>
        <div id="loading-ethereum" class="loading">
            <div class="spinner"></div>
            Loading Ethereum prices...
        </div>
        <div id="prices-ethereum" class="price-grid" style="display: none;"></div>

        <!-- Ripple Section -->
        <h2 class="section-title">✕ Ripple (XRP)</h2>
        <div id="error-ripple" class="error" style="display: none;"></div>
        <div id="loading-ripple" class="loading">
            <div class="spinner"></div>
            Loading Ripple prices...
        </div>
        <div id="prices-ripple" class="price-grid" style="display: none;"></div>

        <!-- Info Bar -->
        <div id="info-bar" class="info-bar" style="display: none;">
            <div class="update-status">
                <span class="status-indicator"></span>
                Live Updates
            </div>
            <div class="last-updated">
                Last updated: <span id="timestamp">--:--:--</span>
            </div>
            <div class="next-update">
                Next update in: <span id="countdown">5:00</span>
            </div>
        </div>
    </div>

    <script>
        const cryptos = [
            { id: 'bitcoin', name: 'Bitcoin', symbol: '₿', type: 'bitcoin' },
            { id: 'ethereum', name: 'Ethereum', symbol: 'Ξ', type: 'ethereum' },
            { id: 'ripple', name: 'Ripple (XRP)', symbol: '✕', type: 'ripple' }
        ];

        const currencies = [
            { code: 'usd', name: 'US Dollar' },
            { code: 'aud', name: 'Australian Dollar' },
            { code: 'php', name: 'Philippine Peso' }
        ];

        let countdownInterval;
        let timeUntilNextUpdate = 300;

        async function fetchPrices() {
            const errorBitcoin = document.getElementById('error-bitcoin');
            const loadingBitcoin = document.getElementById('loading-bitcoin');
            const pricesBitcoin = document.getElementById('prices-bitcoin');

            const errorEthereum = document.getElementById('error-ethereum');
            const loadingEthereum = document.getElementById('loading-ethereum');
            const pricesEthereum = document.getElementById('prices-ethereum');

            const errorRipple = document.getElementById('error-ripple');
            const loadingRipple = document.getElementById('loading-ripple');
            const pricesRipple = document.getElementById('prices-ripple');

            const infoBar = document.getElementById('info-bar');

            errorBitcoin.style.display = 'none';
            errorEthereum.style.display = 'none';
            errorRipple.style.display = 'none';

            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,ripple&vs_currencies=usd,aud,php');

                if (!response.ok) {
                    throw new Error('API error: ' + response.status);
                }

                const data = await response.json();

                // Update Bitcoin
                updateCryptoDisplay(data.bitcoin, pricesBitcoin, loadingBitcoin, 'bitcoin');

                // Update Ethereum
                updateCryptoDisplay(data.ethereum, pricesEthereum, loadingEthereum, 'ethereum');

                // Update Ripple
                updateCryptoDisplay(data.ripple, pricesRipple, loadingRipple, 'ripple');

                const now = new Date();
                const timeString = now.toLocaleTimeString('en-US', { 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit' 
                });
                document.getElementById('timestamp').textContent = timeString;

                infoBar.style.display = 'flex';
                timeUntilNextUpdate = 300;
                updateCountdown();

            } catch (error) {
                console.error('Error fetching prices:', error);
                errorBitcoin.innerHTML = '<div class="error">Failed to fetch prices. Retrying in 5 minutes...</div>';
                errorBitcoin.style.display = 'block';
                loadingBitcoin.style.display = 'none';
                pricesBitcoin.style.display = 'none';

                errorEthereum.innerHTML = '<div class="error">Failed to fetch prices. Retrying in 5 minutes...</div>';
                errorEthereum.style.display = 'block';
                loadingEthereum.style.display = 'none';
                pricesEthereum.style.display = 'none';

                errorRipple.innerHTML = '<div class="error">Failed to fetch prices. Retrying in 5 minutes...</div>';
                errorRipple.style.display = 'block';
                loadingRipple.style.display = 'none';
                pricesRipple.style.display = 'none';

                infoBar.style.display = 'flex';
            }
        }

        function updateCryptoDisplay(prices, container, loader, cryptoType) {
            container.innerHTML = currencies.map(currency => {
                const price = prices[currency.code];
                const formattedPrice = new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: currency.code.toUpperCase(),
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                }).format(price);

                const cardClass = cryptoType === 'ethereum' ? 'ethereum' : cryptoType === 'ripple' ? 'ripple' : '';
                return '<div class="price-card ' + cardClass + '"><div class="currency-code">' + currency.code.toUpperCase() + '</div><div class="price">' + formattedPrice + '</div><div class="currency-name">' + currency.name + '</div></div>';
            }).join('');

            loader.style.display = 'none';
            container.style.display = 'grid';
        }

        function updateCountdown() {
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }

            countdownInterval = setInterval(function() {
                timeUntilNextUpdate--;

                if (timeUntilNextUpdate <= 0) {
                    clearInterval(countdownInterval);
                    fetchPrices();
                    return;
                }

                const minutes = Math.floor(timeUntilNextUpdate / 60);
                const seconds = timeUntilNextUpdate % 60;
                const countdownText = minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
                document.getElementById('countdown').textContent = countdownText;
            }, 1000);
        }

        window.addEventListener('load', function() {
            fetchPrices();
        });
    </script>
</body>
</html>
